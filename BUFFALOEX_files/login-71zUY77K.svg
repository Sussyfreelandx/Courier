<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b4a36"/>
      <stop offset="100%" stop-color="#2c2218"/>
    </linearGradient>
    <linearGradient id="ceil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3024"/>
      <stop offset="100%" stop-color="#7a634a"/>
    </linearGradient>
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2d22"/>
      <stop offset="100%" stop-color="#22180f"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a47a4d"/>
      <stop offset="100%" stop-color="#6b4a2a"/>
    </linearGradient>
    <linearGradient id="boxDk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7d5a36"/>
      <stop offset="100%" stop-color="#4f3520"/>
    </linearGradient>
    <radialGradient id="sepia" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#ffd9a8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7a4a20" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1a0e06" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="boxes" x="0" y="0" width="60" height="50" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="26" height="22" fill="url(#box)" stroke="#3d2a18" stroke-width="1"/>
      <rect x="32" y="2" width="26" height="22" fill="url(#boxDk)" stroke="#3d2a18" stroke-width="1"/>
      <rect x="2" y="26" width="26" height="22" fill="url(#boxDk)" stroke="#3d2a18" stroke-width="1"/>
      <rect x="32" y="26" width="26" height="22" fill="url(#box)" stroke="#3d2a18" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Ceiling / upper area -->
  <rect width="1600" height="380" fill="url(#ceil)"/>
  <!-- Floor -->
  <rect y="380" width="1600" height="520" fill="url(#floor)"/>

  <!-- Center vanishing aisle (lighter) -->
  <polygon points="600,380 1000,380 920,900 680,900" fill="#7a5a3a" opacity="0.45"/>
  <polygon points="700,380 900,380 850,900 750,900" fill="#9a7548" opacity="0.35"/>

  <!-- Ceiling beams (perspective lines) -->
  <g stroke="#1d150d" stroke-width="2" opacity="0.55">
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="350" x2="1600" y2="350"/>
  </g>
  <!-- Ceiling lights -->
  <g fill="#fff3d6" opacity="0.85">
    <rect x="180" y="118" width="120" height="6" rx="2"/>
    <rect x="500" y="118" width="120" height="6" rx="2"/>
    <rect x="820" y="118" width="120" height="6" rx="2"/>
    <rect x="1140" y="118" width="120" height="6" rx="2"/>
    <rect x="240" y="198" width="100" height="5" rx="2"/>
    <rect x="600" y="198" width="100" height="5" rx="2"/>
    <rect x="960" y="198" width="100" height="5" rx="2"/>
    <rect x="1320" y="198" width="100" height="5" rx="2"/>
  </g>

  <!-- Left shelving (perspective) -->
  <g>
    <!-- Far left tall rack -->
    <polygon points="0,380 280,380 240,900 0,900" fill="url(#rack)"/>
    <g transform="translate(0,380)">
      <rect x="10" y="20" width="220" height="140" fill="url(#boxes)" opacity="0.95"/>
      <rect x="10" y="180" width="210" height="140" fill="url(#boxes)" opacity="0.92"/>
      <rect x="10" y="340" width="200" height="140" fill="url(#boxes)" opacity="0.88"/>
      <!-- Horizontal shelf bars -->
      <line x1="0" y1="160" x2="240" y2="160" stroke="#0f0a05" stroke-width="3"/>
      <line x1="0" y1="320" x2="230" y2="320" stroke="#0f0a05" stroke-width="3"/>
      <line x1="0" y1="480" x2="220" y2="480" stroke="#0f0a05" stroke-width="3"/>
    </g>
    <!-- Mid left rack -->
    <polygon points="280,400 520,400 500,900 240,900" fill="#3a2c20"/>
    <g transform="translate(280,400)">
      <rect x="10" y="20" width="200" height="120" fill="url(#boxes)" opacity="0.85"/>
      <rect x="10" y="160" width="195" height="120" fill="url(#boxes)" opacity="0.82"/>
      <rect x="10" y="300" width="190" height="120" fill="url(#boxes)" opacity="0.78"/>
      <line x1="0" y1="140" x2="220" y2="140" stroke="#100a05" stroke-width="3"/>
      <line x1="0" y1="280" x2="215" y2="280" stroke="#100a05" stroke-width="3"/>
      <line x1="0" y1="420" x2="210" y2="420" stroke="#100a05" stroke-width="3"/>
    </g>
  </g>

  <!-- Right shelving (perspective, mirrored) -->
  <g>
    <polygon points="1320,380 1600,380 1600,900 1360,900" fill="url(#rack)"/>
    <g transform="translate(1370,380)">
      <rect x="0" y="20" width="220" height="140" fill="url(#boxes)" opacity="0.95"/>
      <rect x="0" y="180" width="220" height="140" fill="url(#boxes)" opacity="0.92"/>
      <rect x="0" y="340" width="220" height="140" fill="url(#boxes)" opacity="0.88"/>
      <line x1="0" y1="160" x2="230" y2="160" stroke="#0f0a05" stroke-width="3"/>
      <line x1="0" y1="320" x2="230" y2="320" stroke="#0f0a05" stroke-width="3"/>
      <line x1="0" y1="480" x2="230" y2="480" stroke="#0f0a05" stroke-width="3"/>
    </g>
    <polygon points="1080,400 1320,400 1360,900 1100,900" fill="#3a2c20"/>
    <g transform="translate(1100,400)">
      <rect x="10" y="20" width="200" height="120" fill="url(#boxes)" opacity="0.85"/>
      <rect x="10" y="160" width="200" height="120" fill="url(#boxes)" opacity="0.82"/>
      <rect x="10" y="300" width="200" height="120" fill="url(#boxes)" opacity="0.78"/>
      <line x1="0" y1="140" x2="220" y2="140" stroke="#100a05" stroke-width="3"/>
      <line x1="0" y1="280" x2="220" y2="280" stroke="#100a05" stroke-width="3"/>
      <line x1="0" y1="420" x2="220" y2="420" stroke="#100a05" stroke-width="3"/>
    </g>
  </g>

  <!-- Vertical rack uprights -->
  <g stroke="#0e0905" stroke-width="3" opacity="0.85">
    <line x1="280" y1="380" x2="240" y2="900"/>
    <line x1="520" y1="400" x2="500" y2="900"/>
    <line x1="1320" y1="380" x2="1360" y2="900"/>
    <line x1="1080" y1="400" x2="1100" y2="900"/>
  </g>

  <!-- Floor reflection lines (perspective) -->
  <g stroke="#000" stroke-width="1" opacity="0.25">
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="820" x2="1600" y2="820"/>
  </g>

  <!-- Sepia / warm overlay to match the brand tone in the screenshot -->
  <rect width="1600" height="900" fill="url(#sepia)"/>
  <rect width="1600" height="900" fill="#7a4a20" opacity="0.18"/>
</svg>
